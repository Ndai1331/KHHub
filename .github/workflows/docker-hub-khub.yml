# Build selected KHHub images and push to Docker Hub (<service>-latest tags).
# Commit message drives what runs (see job "select"):
#   [All]              -> build & push all images
#   [services/x, apps/y] -> build & push only those path segments (comma-separated)
#   no [...] in message -> skip build (job succeeds, nothing pushed)
# Manual run (workflow_dispatch) -> build all.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN. Optional: DOCKER_IMAGE_REGISTRY (default longnguyen1331/khub).

name: Docker Hub — build and push khub

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: docker-hub-khub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.parse.outputs.skip }}
      mode: ${{ steps.parse.outputs.mode }}
      paths: ${{ steps.parse.outputs.paths }}
    steps:
      - name: Resolve build scope from commit message
        id: parse
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 << 'PY'
          import os, re

          gh_out = os.environ["GITHUB_OUTPUT"]
          event = os.environ.get("EVENT_NAME", "")
          msg = os.environ.get("COMMIT_MSG") or ""

          def out(**kwargs):
              with open(gh_out, "a", encoding="utf-8") as f:
                  for k, v in kwargs.items():
                      f.write(f"{k}={v}\n")

          if event == "workflow_dispatch":
              out(skip="false", mode="all", paths="")
              raise SystemExit(0)

          m = re.search(r"\[([^\]]+)\]", msg)
          if not m:
              out(skip="true", mode="none", paths="")
              raise SystemExit(0)

          inner = m.group(1).strip()
          if re.fullmatch(r"(?i)All", inner):
              out(skip="false", mode="all", paths="")
              raise SystemExit(0)

          parts = [p.strip() for p in inner.split(",") if p.strip()]
          if not parts:
              out(skip="true", mode="none", paths="")
              raise SystemExit(0)

          paths_val = ",".join(parts)
          with open(gh_out, "a", encoding="utf-8") as f:
              f.write("skip=false\n")
              f.write("mode=paths\n")
              f.write(f"paths={paths_val}\n")
          PY

      - name: Report selection
        run: |
          echo "skip=${{ steps.parse.outputs.skip }}"
          echo "mode=${{ steps.parse.outputs.mode }}"
          echo "paths=${{ steps.parse.outputs.paths }}"

      - name: No Docker build (commit has no [path] or [All] tag)
        if: steps.parse.outputs.skip == 'true'
        run: echo "Skipping build — include [All] or comma-separated repo paths like [services/masterdata, apps/web] in the commit message to push images."

  build-push:
    needs: select
    if: needs.select.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Drop BuildKit/buildx layer cache so CI does not reuse stale images from the runner.
      - name: Clear Docker Buildx cache
        run: docker buildx prune -af

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images (PowerShell scripts)
        working-directory: etc/helm
        env:
          KHUB_REGISTRY: ${{ secrets.DOCKER_IMAGE_REGISTRY }}
          # build-image.ps1 passes --no-cache to docker build when set (avoids stale layers within the job).
          DOCKER_BUILD_NO_CACHE: "true"
        run: |
          REG="${KHUB_REGISTRY:-longnguyen1331/khub}"
          MODE="${{ needs.select.outputs.mode }}"
          PATHS="${{ needs.select.outputs.paths }}"
          if [ "$MODE" = "all" ]; then
            pwsh -NoProfile -File ./build-all-khub-images.ps1 -Registry "$REG" -Platform "linux/amd64" -All
          else
            pwsh -NoProfile -File ./build-all-khub-images.ps1 -Registry "$REG" -Platform "linux/amd64" -PathsSpec "$PATHS"
          fi
