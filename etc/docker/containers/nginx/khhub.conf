# KHHub — nginx reverse proxy for 4 public hosts (TLS at nginx, apps on localhost).
# Matches etc/docker/containers/khub.yml published ports:
#   www.khub.id.vn   -> 127.0.0.1:44347 (web)
#   auth.khub.id.vn  -> 127.0.0.1:44315 (authserver)
#   api.khub.id.vn   -> 127.0.0.1:44394 (webgateway)
#   m-api.khub.id.vn -> 127.0.0.1:44395 (mobilegateway)
#
# Install on Ubuntu (example):
#   sudo apt install nginx
#   sudo cp khhub.conf /etc/nginx/conf.d/khhub.conf
#   # Obtain certificates (adjust email and domains):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot certonly --webroot -w /var/www/html -d www.khub.id.vn -d auth.khub.id.vn -d api.khub.id.vn -d m-api.khub.id.vn
#   # Or use one multi-SAN cert; set ssl_certificate paths below to match Let's Encrypt live folder.
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you change the domain, replace server_name and ssl_certificate paths consistently.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- Web (MVC) ----
server {
    listen 80;
    listen [::]:80;
    server_name www.khub.id.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.khub.id.vn;

    ssl_certificate     /etc/letsencrypt/live/khub.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khub.id.vn/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:44347;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_read_timeout 120s;
    }
}

