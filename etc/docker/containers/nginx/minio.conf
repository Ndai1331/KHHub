# MinIO production reverse proxy (BT/aaPanel-style vhosts).
# Prereqs:
# - DNS: minio.khub.id.vn -> server IP; minio.khub.id.vn -> server IP
# - Docker compose maps host 9000 (S3 API) and 9001 (Console); see etc/docker/containers/minio.yml
# - Issue SSL in panel for both hostnames (or use a wildcard cert and same paths for both blocks)
# - Align PublicBaseUrl / PresignPublicEndpoint in appsettings.Production with https://minio.khub.id.vn

# --- S3 API (port 9000) ---
server
{
    listen 80;
    listen 443 ssl http2;
    server_name minio.khub.id.vn;
    index index.html;
    root /www/wwwroot/minio.khub.id.vn;
    include /www/server/panel/vhost/nginx/extension/minio.khub.id.vn/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/minio.khub.id.vn.conf;
    #CERT-APPLY-CHECK--END

    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    ssl_certificate    /www/server/panel/vhost/cert/minio.khub.id.vn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/minio.khub.id.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;

    location ~ \.well-known{
        allow all;
    }

    # Large object uploads (tune as needed)
    client_max_body_size 1G;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    access_log  /www/wwwlogs/minio.khub.id.vn.log;
    error_log  /www/wwwlogs/minio.khub.id.vn.error.log;
}

